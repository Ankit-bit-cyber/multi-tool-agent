# Tool Configuration
tools:
  calculator:
    enabled: true
    timeout: 5
  
  weather:
    enabled: true
    timeout: 10
    api: openweathermap
  
  search:
    enabled: true
    timeout: 10
    api: serpapi
    fallback: duckduckgo

# Agent Configuration
agent:
  max_iterations: 10
  temperature: 0.7
  max_tokens: 1024
  verbose: true

# LLM Configuration
llm:
  provider: anthropic  # or openai
  model: claude-3-sonnet-20240229
  timeout: 30

# Logging Configuration
logging:
  level: INFO
  format: verbose
